name: Daily Theme Rotation

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-theme
  cancel-in-progress: false

jobs:
  rotate-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          persist-credentials: true

      - name: Decide whether to skip
        id: check
        run: |
          last_msg=$(git log -1 --pretty=%s)
          last_ts=$(git log -1 --pretty=%ct)   # commit time, unix epoch seconds
          now_ts=$(date -u +%s)
          age_hours=$(( (now_ts - last_ts) / 3600 ))

          echo "Last commit: $last_msg"
          echo "Commit age: ${age_hours} hours"
          echo "Triggered by: ${{ github.event_name }}"

          # Manual runs always proceed.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual run — never skip."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bot commits always continue the rotation chain.
          if [[ "$last_msg" == "chore(theme):"* ]]; then
            echo "Last commit was an automated theme update — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Manual commits within the last 20 hours block today's rotation
          # (gives you a one-day grace period to make follow-up edits without
          # the bot clobbering them). After that, rotation resumes.
          if [[ "$age_hours" -lt 20 ]]; then
            echo "Recent manual commit (${age_hours}h old) — skipping today."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Manual commit is older than 20 hours — resuming rotation."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r scripts/requirements.txt

      - name: Run theme rotation
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_theme.py

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "schaefer-io-bot"
          git config user.email "[email protected]"

          echo "--- git status before staging ---"
          git status --short

          git add -A

          echo "--- staged changes ---"
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          today=$(date -u +%Y-%m-%d)
          git commit -m "chore(theme): daily rotation $today"

          echo "--- pushing to ${GITHUB_REF_NAME} ---"
          git push origin HEAD:"${GITHUB_REF_NAME}"

          echo "--- done ---"
