name: Daily Theme Rotation

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-theme
  cancel-in-progress: false

jobs:
  rotate-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          # Persist the GITHUB_TOKEN credentials so we can push later.
          persist-credentials: true

      - name: Skip if last commit was manual
        id: check
        run: |
          last_msg=$(git log -1 --pretty=%s)
          echo "Last commit: $last_msg"
          echo "Triggered by: ${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual run — never skip."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [[ "$last_msg" == "chore(theme):"* ]]; then
            echo "Last commit was an automated theme update — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Last commit was manual — skipping today to avoid clobbering."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r scripts/requirements.txt

      - name: Run theme rotation
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_theme.py

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "schaefer-io-bot"
          git config user.email "[email protected]"

          echo "--- git status before staging ---"
          git status --short

          # Stage everything that changed (theme.css, theme-history.json, anything else the script might add)
          git add -A

          echo "--- staged changes ---"
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          today=$(date -u +%Y-%m-%d)
          git commit -m "chore(theme): daily rotation $today"

          echo "--- pushing to ${GITHUB_REF_NAME} ---"
          git push origin HEAD:"${GITHUB_REF_NAME}"

          echo "--- done ---"
